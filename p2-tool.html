<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>People Alpha — Revenue Fluent</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
 --bg:#0E0F12; --bg2:#1A1A22; --bg3:#141418; --bg4:#22222C;
 --copper:#B87333; --copper-lt:#E8C87A; --copper-dim:rgba(184,115,51,.12);
 --sig-red:#E05C3A; --sig-amber:#E8C87A; --sig-teal:#5CC8A0; --sig-mute:#4A4A5A;
 --text:#E8E6E0; --text-dim:#8A8A9A; --text-mute:#4A4A5A;
 --border:#2A2A35; --border-hi:#3A3A48; --border-accent:#B87333;
 --font:'Sora',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:980px;margin:0 auto;padding:36px 32px 80px}
.crumb{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;color:var(--text-mute);margin-bottom:30px}
.crumb a{color:var(--copper-lt);text-decoration:none}
.crumb a:hover{text-decoration:underline}
.eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);margin-bottom:14px}
.switch{display:flex;align-items:center;gap:12px;margin-bottom:34px;flex-wrap:wrap}
.switch label{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute)}
.switch select{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-family:var(--font);font-size:.92rem;cursor:pointer;min-width:260px}
.switch select:hover{border-color:var(--copper)}
.scen-meta{font-family:var(--mono);font-size:.74rem;color:var(--text-dim)}
.scen-meta b{color:var(--copper-lt)}
.story{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--copper);border-radius:0 14px 14px 0;padding:30px 34px;margin-bottom:40px}
.story .q{font-family:Georgia,serif;font-style:italic;font-size:1.32rem;line-height:1.5;color:var(--text);margin-bottom:16px}
.story .ctx{font-size:.96rem;color:var(--text-dim);font-weight:300}
.story .ctx b{color:var(--copper-lt);font-weight:500}
h2{font-size:1.0rem;font-weight:500;letter-spacing:.02em;margin-bottom:6px;display:flex;align-items:center;gap:10px}
h2 .step{font-family:var(--mono);font-size:.7rem;color:var(--copper);border:1px solid var(--copper);border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center}
.sub{font-size:.88rem;color:var(--text-dim);margin-bottom:22px;font-weight:300}
.inputs{margin-bottom:46px}
.slider{margin-bottom:26px}
.slider .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.slider .name{font-size:.96rem;font-weight:400}
.slider .val{font-family:var(--mono);font-size:1.0rem;color:var(--copper-lt);font-weight:500}
.slider input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none}
.slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--copper);cursor:pointer;border:3px solid var(--bg)}
.slider input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--copper);cursor:pointer;border:3px solid var(--bg)}
.why{font-family:Georgia,serif;font-style:italic;font-size:.84rem;color:var(--text-dim);margin-top:9px;line-height:1.5}
.reveal{border-top:1px solid var(--border);padding-top:36px}
.hero{display:flex;align-items:baseline;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.hero .big{font-family:var(--mono);font-size:3.4rem;font-weight:700;letter-spacing:-.03em;line-height:1}
.hero .lbl{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}
.big.pos{color:var(--sig-teal)} .big.neg{color:var(--sig-red)} .big.flat{color:var(--copper-lt)}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:30px}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;transition:border-color .2s}
.mcard:hover{border-color:var(--border-hi)}
.mcard .mlabel{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.mcard .mval{font-family:var(--mono);font-size:1.9rem;font-weight:600;letter-spacing:-.02em}
.mcard .bar{height:5px;background:var(--bg4);border-radius:3px;margin-top:14px;overflow:hidden;position:relative}
.mcard .zero{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--text-mute)}
.mcard .fill{height:100%;border-radius:3px;transition:all .6s cubic-bezier(.19,1,.22,1);position:absolute;top:0}
.mcard .mwhy{font-size:.8rem;color:var(--text-mute);margin-top:12px;line-height:1.45;font-weight:300}
.mval.pos{color:var(--sig-teal)} .mval.neg{color:var(--sig-red)} .mval.flat{color:var(--copper-lt)}
.fill.pos{background:var(--sig-teal)} .fill.neg{background:var(--sig-red)}
.statement{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-top:8px}
.statement .slabel{font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--copper);margin-bottom:14px}
.statement .stext{font-family:Georgia,serif;font-style:italic;font-size:1.18rem;line-height:1.6;color:var(--text)}
.statement .stext b{color:var(--copper-lt);font-style:normal;font-weight:500}
.err{background:var(--bg2);border:1px solid var(--sig-red);border-radius:10px;padding:18px;color:var(--sig-red);font-family:var(--mono);font-size:.82rem}
@media(max-width:680px){.cards{grid-template-columns:1fr}}
</style></head>
<body><div class="wrap">
 <div class="crumb"><a href="scenario-library.html">&larr; Scenario Library</a><span>/</span><span>/</span><a href="#" id="navP1">Revenue Connect</a><span style="color:var(--text-mute)">·</span><a href="#" id="navP2">People Alpha</a></div>
 <div class="eyebrow">Revenue Fluent · L2 · People Alpha</div>
 <div class="switch">
   <label for="scen">Scenario</label>
   <select id="scen"></select>
   <span class="scen-meta" id="meta"></span>
 </div>
 <div id="app"></div>
</div>

<script src="rf-data.js"></script>
<script>
(function(){
  var app=document.getElementById('app');
  if(!window.RF || !window.RF.alphas){
    app.innerHTML='<div class="err">rf-data.js failed to load (or is an older version without the alpha engine). Keep the latest rf-data.js beside this page.</div>';
    return;
  }
  var sel=document.getElementById('scen');
  RF.list().forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
  var current=RF.current(); sel.value=current;
  var state={difficulty:1.0};

  function sign(x){return x>0?'+'+x:''+x;}
  function cls(x){return x>1?'pos':x<-1?'neg':'flat';}


  function wireToolNav(){
    var sc=encodeURIComponent(current);
    var p1=document.getElementById('navP1'), p2=document.getElementById('navP2');
    if(p1){p1.href='p1-tool.html?scenario='+sc; p1.style.fontWeight=(location.pathname.indexOf('p1')>=0)?'500':'300'; if(location.pathname.indexOf('p1')>=0)p1.style.color='var(--text)';}
    if(p2){p2.href='p2-tool.html?scenario='+sc; p2.style.fontWeight=(location.pathname.indexOf('p2')>=0)?'500':'300'; if(location.pathname.indexOf('p2')>=0)p2.style.color='var(--text)';}
  }
  function render(name){
    var s=RF.scenario(name), sum=RF.summary(name);
    var a=RF.alphas(name, state.difficulty);
    document.getElementById('meta').innerHTML='<b>'+s.employeeCount+'</b> people · <b>'+sum.geo+'</b> · '+sum.industry;
    var oCls=cls(a.overall);
    var verb = state.difficulty>1.05?'a market '+Math.round((state.difficulty-1)*100)+'% tougher than today':'today\u2019s market';

    app.innerHTML=''
    + '<div class="story">'
    +   '<div class="q">In finance, alpha is the return you earn <em>above</em> the market. People Alpha asks the same of every talent decision you make.</div>'
    +   '<div class="ctx">Every hire, save, promotion and training rupee either beats the benchmark or lags it. Against <b>'+verb+'</b>, this org\u2019s blended People Alpha is the number below \u2014 and the four engines behind it tell you <b>where</b> the advantage is built or bled.</div>'
    + '</div>'

    + '<div class="inputs">'
    +   '<h2><span class="step">1</span> How tough is the market you measure against?</h2>'
    +   '<div class="sub">Alpha is meaningless without a benchmark. The bar starts at this org\u2019s own cohort averages \u2014 push it up to stress-test against a stronger market.</div>'
    +   '<div class="slider">'
    +     '<div class="row"><span class="name">Market difficulty</span><span class="val" id="v1">'+state.difficulty.toFixed(2)+'\u00d7</span></div>'
    +     '<input type="range" id="s1" min="0.85" max="1.30" step="0.01" value="'+state.difficulty+'">'
    +     '<div class="why">&rarr; 1.00\u00d7 measures the org against itself. Above 1.00\u00d7 raises the benchmark \u2014 \u201ccould we still beat a market this much stronger?\u201d</div>'
    +   '</div>'
    + '</div>'

    + '<div class="reveal">'
    +   '<h2><span class="step">2</span> The blended alpha</h2>'
    +   '<div class="sub">Above-market return across all four talent engines.</div>'
    +   '<div class="hero"><span class="big '+oCls+'">'+sign(a.overall)+'%</span><span class="lbl">Blended People Alpha<br>vs '+state.difficulty.toFixed(2)+'\u00d7 benchmark</span></div>'
    +   '<div class="cards">'
    +     acard('Hiring Alpha','recent hires vs role benchmark', a.hiring, 'Are people hired in the last 2 years beating the market bar for their grade? Positive = your funnel out-picks the market.')
    +     acard('Retention Alpha','value held in your keepers', a.retention, 'Salary-weighted premium of your Stars & High-Potentials over benchmark. This is the advantage you lose if they walk.')
    +     acard('Promotion Alpha','did you elevate the right people', a.promotion, 'Senior grades measured against the org-wide bar. Negative = promotions ran on tenure or quota, not performance.')
    +     acard('L&D Alpha','growth of your tenured people', a.ld, 'Do people with 3+ years out-perform their grade benchmark? Positive = your org compounds talent over time.')
    +   '</div>'
    +   '<div class="statement"><div class="slabel">Intelligence statement</div><div class="stext">'+statement(name,a,sum)+'</div></div>'
    + '</div>';

    wireToolNav();
    document.getElementById('s1').oninput=function(e){state.difficulty=+e.target.value;document.getElementById('v1').textContent=state.difficulty.toFixed(2)+'\u00d7';render(name);};
  }

  function acard(label,sublabel,val,why){
    var c=cls(val), pct=Math.min(Math.abs(val),50)/50*50;  // half-bar each side, cap |50%|
    var fill = val>=0
      ? '<div class="fill pos" style="left:50%;width:'+pct+'%"></div>'
      : '<div class="fill neg" style="right:50%;width:'+pct+'%"></div>';
    return '<div class="mcard">'
      +'<div class="mlabel">'+label+' \u00b7 '+sublabel+'</div>'
      +'<div class="mval '+c+'">'+sign(val)+'%</div>'
      +'<div class="bar"><div class="zero"></div>'+fill+'</div>'
      +'<div class="mwhy">'+why+'</div></div>';
  }

  function statement(name,a,sum){
    var best=[['Hiring',a.hiring],['Retention',a.retention],['Promotion',a.promotion],['L&D',a.ld]].sort(function(x,y){return y[1]-x[1];});
    var top=best[0], bottom=best[3];
    if(a.overall<0)
      return 'This '+sum.industry.toLowerCase()+' org is <b>destroying</b> talent advantage against this benchmark \u2014 a blended <b>'+sign(a.overall)+'%</b>. <b>'+bottom[0]+'</b> is the deepest leak at <b>'+sign(bottom[1])+'%</b>. The budget may be fine; the <em>alpha</em> is not.';
    if(a.overall<3)
      return 'Roughly market-neutral at <b>'+sign(a.overall)+'%</b>. <b>'+top[0]+'</b> carries the org (<b>'+sign(top[1])+'%</b>) while <b>'+bottom[0]+'</b> drags (<b>'+sign(bottom[1])+'%</b>). Thin advantage \u2014 one bad quarter erases it.';
    return 'This org is <b>generating alpha</b> \u2014 <b>'+sign(a.overall)+'%</b> above benchmark. <b>'+top[0]+' Alpha</b> leads at <b>'+sign(top[1])+'%</b>. The work here is protecting that edge, not building it.';
  }

  sel.onchange=function(){current=sel.value;var u=new URL(location);u.searchParams.set('scenario',current);history.replaceState({},'',u);state={difficulty:1.0};render(current);};
  render(current);
})();
</script>
</body></html>
