  var ctx=canvas.getContext('2d');
  var W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<100;i++){particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.3,dx:(Math.random()-.5)*.2,dy:(Math.random()-.5)*.2,o:Math.random()*.3+.04});}
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(function(p){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(210,80,170,'+p.o+')';ctx.fill();
      p.x+=p.dx;p.y+=p.dy;
      if(p.x<0||p.x>W)p.dx*=-1;if(p.y<0||p.y>H)p.dy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// THREE.JS HUMACITY ORB
(function(){
  if(typeof THREE === 'undefined') return;

  var canvas = document.getElementById('humacityCanvas');
  var wrap = canvas.parentElement;
  var W = wrap.offsetWidth, H = wrap.offsetHeight;

  var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 100);
  camera.position.set(0, 0, 5);

  // CORE SPHERE, Humacity orb
  var coreGeo = new THREE.SphereGeometry(1.2, 64, 64);
  var coreMat = new THREE.MeshPhongMaterial({
    color: 0x0A0C14,
    emissive: 0x1A0818,
    specular: 0xC0409A,
    shininess: 80,
    transparent: true,
    opacity: 0.9,
    wireframe: false,
  });
  var core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);

  // WIREFRAME OVERLAY on core
  var wireMat = new THREE.MeshBasicMaterial({color:0x1A3A6A, wireframe:true, transparent:true, opacity:0.15});
  var wire = new THREE.Mesh(new THREE.SphereGeometry(1.21,24,24), wireMat);
  scene.add(wire);

  // OUTER GLOW RING
  var ringGeo = new THREE.TorusGeometry(1.6, 0.015, 8, 120);
  var ringMat = new THREE.MeshBasicMaterial({color:0xC0409A, transparent:true, opacity:0.4});
  var ring1 = new THREE.Mesh(ringGeo, ringMat);
  ring1.rotation.x = Math.PI/4;
  scene.add(ring1);

  var ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(1.9, 0.01, 8, 120),
    new THREE.MeshBasicMaterial({color:0xB87333, transparent:true, opacity:0.25})
  );
  ring2.rotation.x = -Math.PI/6;
  ring2.rotation.z = Math.PI/5;
  scene.add(ring2);

  // FIVE PILLAR NODES orbiting the core
  var PILLARS = [
    {name:'L1', color:0x38C490, angle:0},
    {name:'L2', color:0xE0B830, angle:Math.PI*2/5},
    {name:'L3', color:0xC0409A, angle:Math.PI*4/5},
    {name:'L4', color:0xE8C87A, angle:Math.PI*6/5},
    {name:'L5', color:0xE05C3A, angle:Math.PI*8/5},
  ];

  var nodes = [];
  var orbitRadius = 2.2;

  PILLARS.forEach(function(p){
    var nodeGeo = new THREE.SphereGeometry(0.12, 16, 16);
    var nodeMat = new THREE.MeshPhongMaterial({
      color:p.color, emissive:p.color, emissiveIntensity:0.6,
      transparent:true, opacity:0.9
    });
    var node = new THREE.Mesh(nodeGeo, nodeMat);
    node.position.x = Math.cos(p.angle) * orbitRadius;
    node.position.y = Math.sin(p.angle) * 0.6;
    node.position.z = Math.sin(p.angle) * orbitRadius * 0.7;
    scene.add(node);

    // Line from core to node
    var linePts = [new THREE.Vector3(0,0,0), node.position.clone()];
    var lineGeo = new THREE.BufferGeometry().setFromPoints(linePts);
    var lineMat = new THREE.LineBasicMaterial({color:p.color, transparent:true, opacity:0.2});
    scene.add(new THREE.Line(lineGeo, lineMat));

    nodes.push({mesh:node, angle:p.angle, color:p.color, speed: 0.003 + Math.random()*0.002});
  });

  // PARTICLE CLOUD around orb
  var ptCount = 300;
  var ptGeo = new THREE.BufferGeometry();
  var ptPos = new Float32Array(ptCount * 3);
  for(var i=0;i<ptCount;i++){
    var theta = Math.random()*Math.PI*2;
    var phi = Math.random()*Math.PI;
    var r = 1.4 + Math.random()*1.4;
    ptPos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    ptPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    ptPos[i*3+2] = r*Math.cos(phi);
  }
  ptGeo.setAttribute('position', new THREE.BufferAttribute(ptPos,3));
  var ptMat = new THREE.PointsMaterial({color:0xC0409A, size:0.025, transparent:true, opacity:0.5});
  scene.add(new THREE.Points(ptGeo, ptMat));

  // LIGHTING
  var ambLight = new THREE.AmbientLight(0x1A0818, 2);
  scene.add(ambLight);
  var ptLight1 = new THREE.PointLight(0xC0409A, 3, 10);
  ptLight1.position.set(3,2,3);
  scene.add(ptLight1);
  var ptLight2 = new THREE.PointLight(0xE0B830, 2, 8);
  ptLight2.position.set(-2,-2,2);
  scene.add(ptLight2);
  var ptLight3 = new THREE.PointLight(0xB87333, 1.5, 8);
  ptLight3.position.set(0,3,-2);
  scene.add(ptLight3);

  // MOUSE INTERACTION
  var mouse = {x:0, y:0};
  var isDragging = false;
  var prevMouse = {x:0, y:0};
  var rotVel = {x:0, y:0};

  canvas.addEventListener('mousedown', function(e){isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup', function(){isDragging=false;});
  window.addEventListener('mousemove', function(e){
    if(isDragging){
      rotVel.y += (e.clientX - prevMouse.x) * 0.005;
      rotVel.x += (e.clientY - prevMouse.y) * 0.005;
      prevMouse={x:e.clientX,y:e.clientY};
    }
  });
  canvas.addEventListener('touchstart', function(e){isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};});
  window.addEventListener('touchend', function(){isDragging=false;});
  window.addEventListener('touchmove', function(e){
    if(isDragging){
      rotVel.y += (e.touches[0].clientX - prevMouse.x) * 0.005;
      rotVel.x += (e.touches[0].clientY - prevMouse.y) * 0.005;
      prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
  });

  // RESIZE
  window.addEventListener('resize', function(){
    W=wrap.offsetWidth; H=wrap.offsetHeight;
    renderer.setSize(W,H);
    camera.aspect=W/H;
    camera.updateProjectionMatrix();
  });

  var t = 0;
  function animate(){
    requestAnimationFrame(animate);
    t += 0.008;

    // Auto rotation + drag
    rotVel.x *= 0.92;
    rotVel.y *= 0.92;
    core.rotation.y += 0.003 + rotVel.y;
    core.rotation.x += rotVel.x * 0.3;
    wire.rotation.y = core.rotation.y;
    wire.rotation.x = core.rotation.x;

    // Orbit nodes
    nodes.forEach(function(n, i){
      n.angle += n.speed;
      n.mesh.position.x = Math.cos(n.angle) * orbitRadius;
      n.mesh.position.y = Math.sin(n.angle * 0.4) * 0.8;
      n.mesh.position.z = Math.sin(n.angle) * orbitRadius * 0.7;
      // Pulse
      var pulse = 1 + Math.sin(t * 2 + i) * 0.15;
      n.mesh.scale.setScalar(pulse);
    });

    // Ring rotation
    ring1.rotation.z += 0.004;
    ring2.rotation.y += 0.003;

    // Light pulse
    ptLight1.intensity = 2.5 + Math.sin(t) * 0.8;
    ptLight2.intensity = 1.5 + Math.cos(t * 0.7) * 0.6;

    renderer.render(scene, camera);

    // PROJECT 3D NODE POSITIONS TO 2D SCREEN SPACE FOR LABELS
    var wrapRect = wrap.getBoundingClientRect();
    nodes.forEach(function(n, i){
      var label = document.getElementById('nl'+i);
      if(!label) return;
      var vec = n.mesh.position.clone();
      vec.project(camera);
      // Only show label if node is in front (z < 1)
      if(vec.z > 1){ label.style.opacity = '0'; return; }
      var x = (vec.x * 0.5 + 0.5) * W;
      var y = (-(vec.y) * 0.5 + 0.5) * H;
      // Offset label away from orb centre
      var dx = x - W/2, dy = y - H/2;
      var dist = Math.sqrt(dx*dx+dy*dy);
      var offset = 28;
      var ox = dist > 0 ? dx/dist*offset : 0;
      var oy = dist > 0 ? dy/dist*offset : 0;
      label.style.left = (x + ox) + 'px';
      label.style.top  = (y + oy) + 'px';
      label.style.opacity = vec.z < 0.95 ? '1' : '0';
    });
  }
  animate();
})();
</script>
</body></html>
