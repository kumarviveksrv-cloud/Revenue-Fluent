<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Revenue Connect — Revenue Fluent</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
 --bg:#0E0F12; --bg2:#1A1A22; --bg3:#141418; --bg4:#22222C;
 --copper:#B87333; --copper-lt:#E8C87A; --copper-dim:rgba(184,115,51,.12);
 --sig-red:#E05C3A; --sig-amber:#E8C87A; --sig-teal:#5CC8A0; --sig-mute:#4A4A5A;
 --text:#E8E6E0; --text-dim:#8A8A9A; --text-mute:#4A4A5A;
 --border:#2A2A35; --border-hi:#3A3A48; --border-accent:#B87333;
 --font:'Sora',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:980px;margin:0 auto;padding:36px 32px 80px}
.crumb{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;color:var(--text-mute);margin-bottom:30px}
.crumb a{color:var(--copper-lt);text-decoration:none}
.crumb a:hover{text-decoration:underline}
.eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);margin-bottom:14px}
/* scenario switcher */
.switch{display:flex;align-items:center;gap:12px;margin-bottom:34px;flex-wrap:wrap}
.switch label{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute)}
.switch select{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;
 padding:9px 14px;font-family:var(--font);font-size:.92rem;cursor:pointer;min-width:260px}
.switch select:hover{border-color:var(--copper)}
.scen-meta{font-family:var(--mono);font-size:.74rem;color:var(--text-dim)}
.scen-meta b{color:var(--copper-lt)}
/* STORY */
.story{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--copper);border-radius:0 14px 14px 0;padding:30px 34px;margin-bottom:40px}
.story .q{font-family:Georgia,serif;font-style:italic;font-size:1.32rem;line-height:1.5;color:var(--text);margin-bottom:16px}
.story .ctx{font-size:.96rem;color:var(--text-dim);font-weight:300}
.story .ctx b{color:var(--copper-lt);font-weight:500}
h2{font-size:1.0rem;font-weight:500;letter-spacing:.02em;margin-bottom:6px;display:flex;align-items:center;gap:10px}
h2 .step{font-family:var(--mono);font-size:.7rem;color:var(--copper);border:1px solid var(--copper);border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center}
.sub{font-size:.88rem;color:var(--text-dim);margin-bottom:22px;font-weight:300}
/* INPUTS */
.inputs{margin-bottom:46px}
.slider{margin-bottom:26px}
.slider .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.slider .name{font-size:.96rem;font-weight:400}
.slider .val{font-family:var(--mono);font-size:1.0rem;color:var(--copper-lt);font-weight:500}
.slider input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none}
.slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--copper);cursor:pointer;border:3px solid var(--bg)}
.slider input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--copper);cursor:pointer;border:3px solid var(--bg)}
.why{font-family:Georgia,serif;font-style:italic;font-size:.84rem;color:var(--text-dim);margin-top:9px;line-height:1.5}
/* REVEAL */
.reveal{border-top:1px solid var(--border);padding-top:36px}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:30px}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;transition:border-color .2s}
.mcard:hover{border-color:var(--border-hi)}
.mcard .mlabel{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.mcard .mval{font-family:var(--mono);font-size:2.0rem;font-weight:600;letter-spacing:-.02em}
.mcard .bar{height:5px;background:var(--bg4);border-radius:3px;margin-top:14px;overflow:hidden}
.mcard .fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.19,1,.22,1)}
.mcard .mwhy{font-size:.8rem;color:var(--text-mute);margin-top:12px;line-height:1.45;font-weight:300}
.mval.red{color:var(--sig-red)} .mval.amber{color:var(--sig-amber)} .mval.teal{color:var(--sig-teal)} .mval.cop{color:var(--copper-lt)}
.fill.red{background:var(--sig-red)} .fill.amber{background:var(--sig-amber)} .fill.teal{background:var(--sig-teal)} .fill.cop{background:var(--copper)}
.statement{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-top:8px}
.statement .slabel{font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--copper);margin-bottom:14px}
.statement .stext{font-family:Georgia,serif;font-style:italic;font-size:1.18rem;line-height:1.6;color:var(--text)}
.statement .stext b{color:var(--copper-lt);font-style:normal;font-weight:500}
.err{background:var(--bg2);border:1px solid var(--sig-red);border-radius:10px;padding:18px;color:var(--sig-red);font-family:var(--mono);font-size:.82rem}
@media(max-width:680px){.cards{grid-template-columns:1fr}}
</style></head>
<body><div class="wrap">
 <div class="crumb"><a href="scenario-library.html">&larr; Scenario Library</a><span>/</span><span>Revenue Connect</span></div>
 <div class="eyebrow">Revenue Fluent · L1 · Revenue Connect</div>

 <div class="switch">
   <label for="scen">Scenario</label>
   <select id="scen"></select>
   <span class="scen-meta" id="meta"></span>
 </div>

 <div id="app"></div>
</div>

<script src="rf-data.js"></script>
<script>
(function(){
  var app=document.getElementById('app');
  if(!window.RF || !window.RF_DATA){
    app.innerHTML='<div class="err">rf-data.js failed to load. Keep rf-data.js in the same folder as this page.</div>';
    return;
  }
  var sel=document.getElementById('scen');
  RF.list().forEach(function(n){
    var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);
  });
  var current=RF.current();
  sel.value=current;

  // live input state
  var state={exitCost:2.0, riskWeight:1.0};

  function fmtMoney(sym,n){
    return sym + (n>=1e7?(n/1e7).toFixed(2)+'Cr':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?Math.round(n/1e3)+'K':String(Math.round(n)));
  }

  function compute(name){
    var s=RF.scenario(name);
    var emps=s.employees, n=emps.length;
    var total=emps.reduce(function(a,e){return a+e.salary;},0);
    var atRisk=emps.filter(function(e){return e.placement==='Inconsistent Performer'||e.placement==='Emerging Talent';});
    var seniorGrades=['C-Suite','VP','Director','Partner','Senior','Manager','M3','M2'];
    var senior=atRisk.filter(function(e){return seniorGrades.indexOf(e.grade)>=0;});
    var stable=emps.filter(function(e){return ['Star','High Performer','Core Performer','High Potential'].indexOf(e.placement)>=0;}).length;
    var atcCost=atRisk.reduce(function(a,e){return a+e.salary*state.exitCost*state.riskWeight;},0);
    return {
      sym:s.symbol, n:n, total:total,
      atcPct:+(atcCost/total*100).toFixed(1),
      arPct:+(atRisk.length/n*100).toFixed(1),
      tdf:senior.length,
      esr:+(stable/n).toFixed(2),
      atcCost:Math.round(atcCost),
      atRiskN:atRisk.length,
      starsN:emps.filter(function(e){return e.placement==='Star';}).length
    };
  }

  function render(name){
    var s=RF.scenario(name), sum=RF.summary(name), m=compute(name);
    document.getElementById('meta').innerHTML='<b>'+m.n+'</b> people · <b>'+sum.geo+'</b> · base <b>'+fmtMoney(m.sym,m.total)+'</b>';
    var sevClass = m.atcPct>50?'red':m.atcPct>20?'amber':'teal';
    var esrClass = m.esr<0.5?'red':m.esr<0.75?'amber':'teal';
    var arClass = m.arPct>40?'red':m.arPct>20?'amber':'teal';
    var tdfClass = m.tdf>6?'red':m.tdf>2?'amber':'teal';

    app.innerHTML = ''
    + '<div class="story">'
    +   '<div class="q">'+(sum.hook||'')+'</div>'
    +   '<div class="ctx">Revenue Connect translates this org into financial exposure. Right now <b>'+m.atRiskN+' of '+m.n+'</b> people sit in unstable placements — and <b>'+m.starsN+'</b> are flagged as Stars. Move the dials below to see what attrition actually costs.</div>'
    + '</div>'

    + '<div class="inputs">'
    +   '<h2><span class="step">1</span> What does an exit really cost?</h2>'
    +   '<div class="sub">The hidden math behind every resignation — replacement, ramp-up, lost momentum.</div>'
    +   '<div class="slider">'
    +     '<div class="row"><span class="name">Exit cost multiple</span><span class="val" id="v1">'+state.exitCost.toFixed(1)+'×</span></div>'
    +     '<input type="range" id="s1" min="1" max="3" step="0.1" value="'+state.exitCost+'">'
    +     '<div class="why">&rarr; Each departure costs roughly this multiple of annual salary. Industry norm is ~2× — higher for senior or revenue-bearing roles.</div>'
    +   '</div>'
    +   '<div class="slider">'
    +     '<div class="row"><span class="name">Risk sensitivity</span><span class="val" id="v2">'+state.riskWeight.toFixed(2)+'</span></div>'
    +     '<input type="range" id="s2" min="0.5" max="1.5" step="0.05" value="'+state.riskWeight+'">'
    +     '<div class="why">&rarr; How aggressively to weight flagged at-risk talent. Dial up if your market is hot and exits cluster.</div>'
    +   '</div>'
    + '</div>'

    + '<div class="reveal">'
    +   '<h2><span class="step">2</span> The exposure, in your currency</h2>'
    +   '<div class="sub">Four signals, computed live from '+m.n+' real records.</div>'
    +   '<div class="cards">'
    +     card('ATC %','Attrition Cost / comp base', m.atcPct+'%', sevClass, Math.min(m.atcPct,100), 'Total exit cost as a share of your '+fmtMoney(m.sym,m.total)+' comp base.')
    +     card('AR %','Attrition Rate (flagged)', m.arPct+'%', arClass, m.arPct, m.atRiskN+' of '+m.n+' people sit in unstable placements today.')
    +     card('TDF','Talent Disruption Freq', m.tdf, tdfClass, Math.min(m.tdf*8,100), 'At-risk people in senior / revenue-bearing grades — the costly exits.')
    +     card('ESR','Execution Stability Ratio', m.esr, esrClass, m.esr*100, 'Share of the org in stable, performing placements. Higher is calmer.')
    +   '</div>'
    +   '<div class="statement">'
    +     '<div class="slabel">Intelligence statement</div>'
    +     '<div class="stext">'+statement(name,m,sum)+'</div>'
    +   '</div>'
    + '</div>';

    // wire sliders
    document.getElementById('s1').oninput=function(e){state.exitCost=+e.target.value;document.getElementById('v1').textContent=state.exitCost.toFixed(1)+'×';render(name);};
    document.getElementById('s2').oninput=function(e){state.riskWeight=+e.target.value;document.getElementById('v2').textContent=state.riskWeight.toFixed(2);render(name);};
  }

  function card(label,sublabel,val,cls,pct,why){
    return '<div class="mcard">'
      +'<div class="mlabel">'+label+' · '+sublabel+'</div>'
      +'<div class="mval '+cls+'">'+val+'</div>'
      +'<div class="bar"><div class="fill '+cls+'" style="width:'+Math.max(2,Math.min(pct,100))+'%"></div></div>'
      +'<div class="mwhy">'+why+'</div>'
      +'</div>';
  }

  function statement(name,m,sum){
    var risk=fmtMoney(m.sym,m.atcCost);
    if(m.atcPct>50)
      return 'The board sees a '+sum.industry.toLowerCase()+' org running normally. Revenue Fluent sees <b>'+risk+'</b> of exposure — <b>'+m.atcPct+'%</b> of the comp base — concentrated in <b>'+m.atRiskN+'</b> unstable roles. This is not a morale issue. It is a balance-sheet event.';
    if(m.atcPct>20)
      return 'Stability is holding, but <b>'+risk+'</b> sits at risk across <b>'+m.atRiskN+'</b> people. With <b>'+m.tdf+'</b> of those in senior grades, the exposure is quieter than it looks — and more expensive to replace.';
    return 'A healthy picture: <b>'+m.starsN+'</b> Stars, an ESR of <b>'+m.esr+'</b>, and only <b>'+risk+'</b> at risk. The work here is protecting the upside, not patching leaks.';
  }

  sel.onchange=function(){
    current=sel.value;
    var u=new URL(location);u.searchParams.set('scenario',current);history.replaceState({},'',u);
    state={exitCost:2.0,riskWeight:1.0};
    render(current);
  };
  render(current);
})();
</script>
</body></html>
