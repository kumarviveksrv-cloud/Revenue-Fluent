<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Human P&L — Revenue Fluent</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04060E;--bg2:#0A0C14;--bg3:#060810;--bg4:#080A18;
  --cobalt:#3A7ADB;--cobalt-dim:rgba(30,80,200,.15);--cobalt-glow:rgba(30,80,200,.08);
  --cobalt-border:rgba(30,80,200,.18);
  --gold:#E0B830;--gold-dim:rgba(224,184,48,.12);
  --copper:#B87333;--copper-lt:#E8C87A;
  --teal:#38C490;--red:#E05C3A;--amber:#E8C87A;
  --text:#E8E6E0;--text-cool:#DCE8F8;--text-mid:#B8C8E8;--text-dim:#9AB8D8;
  --text-mute:rgba(30,80,200,.25);--border:rgba(30,80,200,.15);--border-hi:rgba(30,80,200,.3);
  --font:'Sora',sans-serif;--mono:'DM Mono',monospace;
  --serif:'Playfair Display',serif;--hero:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse 70% 40% at 50% 0%,rgba(20,60,160,.18) 0%,transparent 55%),
    radial-gradient(ellipse 50% 30% at 10% 80%,rgba(160,80,20,.06) 0%,transparent 50%),
    linear-gradient(rgba(20,60,180,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(20,60,180,.025) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,52px 52px,52px 52px;
  min-height:100vh;
}
.wrap{max-width:1060px;margin:0 auto;padding:36px 40px 80px}

/* NAV */
.crumb{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;color:var(--text-dim);margin-bottom:32px;flex-wrap:wrap}
.crumb a{color:var(--text-dim);text-decoration:none;transition:color .15s}
.crumb a:hover{color:var(--cobalt)}
.crumb .sep{color:var(--text-mute)}
.tool-nav{display:flex;gap:3px;flex-wrap:wrap}
.tool-nav a{padding:3px 9px;border-radius:5px;border:1px solid var(--border);color:var(--text-dim);font-size:.66rem;text-decoration:none;transition:all .15s}
.tool-nav a:hover{border-color:var(--cobalt-border);color:var(--text-mid)}
.tool-nav a.active{background:var(--cobalt-dim);border-color:var(--cobalt);color:var(--cobalt)}

.eyebrow{font-family:var(--mono);font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:#5A9AEB;margin-bottom:16px}
.switch{display:flex;align-items:center;gap:12px;margin-bottom:36px;flex-wrap:wrap}
.switch label{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}
.switch select{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-family:var(--font);font-size:.9rem;cursor:pointer;min-width:260px;transition:border-color .15s}
.switch select:hover,.switch select:focus{outline:none;border-color:var(--cobalt)}
.scen-meta{font-family:var(--mono);font-size:.72rem;color:var(--text-dim)}
.scen-meta b{color:#7AABDB}

/* PULSE */
@keyframes hero-pulse{
  0%,100%{box-shadow:0 0 0 1px rgba(58,122,219,.2),0 0 16px rgba(30,80,200,.1),0 0 40px rgba(30,80,200,.05)}
  50%{box-shadow:0 0 0 1px rgba(90,160,255,.45),0 0 32px rgba(58,122,219,.2),0 0 64px rgba(30,80,200,.1)}
}
@keyframes cobalt-pulse{
  0%,100%{box-shadow:0 0 0 1px rgba(58,122,219,.3),0 0 8px rgba(30,80,200,.15),0 0 20px rgba(30,80,200,.06)}
  50%{box-shadow:0 0 0 1px rgba(90,160,255,.7),0 0 20px rgba(58,122,219,.4),0 0 40px rgba(30,80,200,.18)}
}

/* INTRO */
.intro-panel{margin-bottom:32px}
.intro-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border:1px solid var(--cobalt-border);border-radius:12px;cursor:pointer;animation:cobalt-pulse 3s ease-in-out infinite}
.intro-tl{display:flex;align-items:center;gap:12px}
.intro-icon{width:26px;height:26px;border-radius:50%;background:var(--cobalt);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.66rem;font-weight:700;color:#fff;font-family:var(--mono)}
.intro-title{font-size:.9rem;font-weight:500;color:var(--text-cool)}
.intro-sub{font-family:var(--mono);font-size:.64rem;color:#5A9AEB;margin-top:2px}
.intro-chevron{font-family:var(--mono);font-size:.66rem;color:var(--text-dim)}
.intro-body{background:var(--bg2);border:1px solid var(--cobalt-border);border-top:none;border-radius:0 0 12px 12px;padding:28px;display:none}
.intro-body.open{display:block}
.intro-sec{margin-bottom:22px}
.intro-sec:last-child{margin-bottom:0}
.intro-sec-lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#5A9AEB;margin-bottom:8px}
.intro-sec-txt{font-size:.9rem;color:var(--text-mid);line-height:1.7}
.intro-sec-txt b{color:var(--text-cool);font-weight:500}
.intro-story{background:var(--bg3);border-left:2px solid var(--cobalt);padding:14px 18px;border-radius:0 8px 8px 0;margin-top:10px;font-family:var(--serif);font-style:italic;font-size:.9rem;line-height:1.6;color:var(--text-mid)}
.intro-story b{color:var(--gold);font-style:normal}
.intro-transition{font-family:var(--serif);font-style:italic;font-size:.88rem;color:var(--text-dim);border-top:1px solid var(--border);padding-top:14px;margin-top:16px;line-height:1.5}
.intro-transition b{color:var(--gold);font-style:normal}

/* HERO */
.hero{padding:44px 52px;margin-bottom:32px;background:linear-gradient(135deg,rgba(8,16,48,.8),rgba(4,6,14,.95));border:1px solid var(--cobalt-border);border-radius:20px;position:relative;overflow:hidden;animation:hero-pulse 3s ease-in-out infinite}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(30,80,200,.5),rgba(224,184,48,.3),rgba(30,80,200,.5),transparent)}
.hero::after{content:'';position:absolute;bottom:-60px;left:20%;width:400px;height:200px;background:radial-gradient(ellipse,rgba(30,80,200,.1) 0%,transparent 65%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr 1px 340px;gap:44px;align-items:center;position:relative;z-index:1}
.hero-divider{background:var(--cobalt-dim)}
.ratio-lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:#5A9AEB;margin-bottom:12px}
.ratio-num{font-family:var(--hero);font-size:7rem;line-height:.88;letter-spacing:.02em;background:linear-gradient(135deg,#F0C840 0%,#D4900A 30%,#F5D060 60%,#C48000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(200,160,40,.25));margin-bottom:10px}
.ratio-desc{font-size:.86rem;color:#C8D8F0;line-height:1.6}
.ratio-desc b{color:#7AABDB;font-weight:400}
.story-rule{width:32px;height:2px;background:linear-gradient(90deg,var(--cobalt),var(--copper));margin-bottom:14px}
.hook{font-family:var(--serif);font-style:italic;font-size:1.18rem;line-height:1.5;color:#EEF4FF;margin-bottom:12px}
.context{font-size:.84rem;color:#C8D8F0;line-height:1.7}
.context b{color:var(--text-cool);font-weight:500}

/* P&L STATEMENT */
.pl-wrap{background:var(--bg2);border:1px solid var(--cobalt-border);border-radius:16px;overflow:hidden;margin-bottom:28px;animation:hero-pulse 3s ease-in-out infinite;position:relative}
.pl-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(30,80,200,.4),rgba(184,115,51,.2),rgba(30,80,200,.4),transparent)}
.pl-header{padding:18px 28px;background:linear-gradient(90deg,rgba(30,80,200,.06),transparent);border-bottom:1px solid var(--cobalt-border);display:flex;align-items:center;justify-content:space-between}
.pl-header-title{font-family:var(--mono);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;background:linear-gradient(90deg,#5A9AEB,var(--copper));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pl-header-sub{font-family:var(--mono);font-size:.62rem;color:var(--text-dim)}

/* P&L ROWS */
.pl-section-head{display:grid;grid-template-columns:minmax(0,1fr) 160px;padding:12px 28px 8px;background:rgba(30,80,200,.04);border-top:1px solid var(--border)}
.pl-section-head span:first-child{font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:#5A9AEB}
.pl-section-head span:last-child{font-family:var(--mono);font-size:.62rem;color:var(--text-mute);text-align:right}
.pl-row{display:grid;grid-template-columns:minmax(0,1fr) 160px;padding:10px 28px 10px 44px;border-top:1px solid rgba(30,80,200,.04);align-items:center;transition:background .12s}
.pl-row:hover{background:rgba(30,80,200,.03)}
.pl-row.editable:hover{background:rgba(30,80,200,.06);cursor:pointer}
.pl-row-label{font-size:.86rem;color:var(--text-mid);display:flex;align-items:center;gap:8px}
.pl-row-label .edit-hint{font-family:var(--mono);font-size:.58rem;color:rgba(90,154,235,.35);opacity:0;transition:opacity .15s}
.pl-row.editable:hover .edit-hint{opacity:1}
.pl-row-val{font-family:var(--mono);font-size:.9rem;text-align:right;white-space:nowrap}
.pl-row-val.pos{color:var(--teal)} .pl-row-val.neg{color:var(--red)} .pl-row-val.neutral{color:var(--text-dim)}
.pl-subtotal{display:grid;grid-template-columns:minmax(0,1fr) 160px;padding:12px 28px;border-top:1px solid rgba(30,80,200,.15);background:rgba(8,16,48,.4)}
.pl-subtotal-label{font-family:var(--mono);font-size:.72rem;font-weight:500;color:var(--text-cool)}
.pl-subtotal-val{font-family:var(--mono);font-size:.92rem;font-weight:600;text-align:right;white-space:nowrap}
.pl-subtotal-val.pos{color:var(--teal)} .pl-subtotal-val.neg{color:var(--red)} .pl-subtotal-val.gold{color:var(--gold)}
.pl-margin-row{display:grid;grid-template-columns:minmax(0,1fr) 160px;padding:14px 28px;background:rgba(30,80,200,.06);border-top:1px solid var(--cobalt-border);border-bottom:1px solid var(--cobalt-border)}
.pl-margin-label{font-family:var(--mono);font-size:.7rem;font-weight:500;color:var(--text-cool)}
.pl-margin-val{font-family:var(--mono);font-size:1.0rem;font-weight:700;text-align:right;white-space:nowrap}
.pl-margin-val.pos{color:var(--teal)} .pl-margin-val.neg{color:var(--red)}
.pl-margin-pct{font-family:var(--mono);font-size:.68rem;color:var(--text-dim);text-align:right;padding:4px 28px 8px;background:rgba(30,80,200,.03)}
.pl-comp-row{display:grid;grid-template-columns:minmax(0,1fr) 160px;padding:12px 28px;background:rgba(184,115,51,.04);border-top:1px solid rgba(184,115,51,.1);border-bottom:1px solid rgba(184,115,51,.1)}
.pl-comp-label{font-size:.82rem;color:var(--copper-lt);display:flex;align-items:center;gap:8px}
.pl-comp-val{font-family:var(--mono);font-size:.88rem;color:var(--copper-lt);text-align:right;white-space:nowrap}
.pl-adj-note{font-family:var(--mono);font-size:.6rem;color:rgba(224,92,58,.5);padding:6px 28px 6px 44px;border-top:1px solid rgba(30,80,200,.04)}
.pl-net{display:grid;grid-template-columns:minmax(0,1fr) 160px;padding:18px 28px;background:linear-gradient(90deg,rgba(30,80,200,.08),rgba(184,115,51,.04),transparent);border-top:2px solid var(--cobalt-border)}
.pl-net-label{font-family:var(--mono);font-size:.74rem;font-weight:600;color:var(--text-cool)}
.pl-net-val{font-family:var(--mono);font-size:1.1rem;font-weight:700;text-align:right;white-space:nowrap}
.pl-net-val.pos{color:var(--teal)} .pl-net-val.neg{color:var(--red)}
.pl-ratio-row{display:grid;grid-template-columns:minmax(0,1fr) 160px;padding:14px 28px;background:rgba(224,184,48,.04);border-top:1px solid rgba(224,184,48,.12)}
.pl-ratio-label{font-family:var(--serif);font-style:italic;font-size:.88rem;color:var(--text-mid)}
.pl-ratio-val{font-family:var(--hero);font-size:1.6rem;color:var(--gold);text-align:right;letter-spacing:.02em;line-height:1}

/* EDIT MODAL */
.edit-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(4,6,14,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.edit-modal{background:var(--bg2);border:1px solid var(--cobalt-border);border-radius:16px;padding:28px;width:440px;max-width:90vw;animation:hero-pulse 3s ease-in-out infinite}
.edit-modal-title{font-family:var(--mono);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:#5A9AEB;margin-bottom:6px}
.edit-modal-label{font-size:.92rem;font-weight:500;color:var(--text-cool);margin-bottom:16px}
.edit-modal-hint{font-size:.82rem;color:var(--text-dim);margin-bottom:16px;line-height:1.5}
.edit-input{width:100%;background:var(--bg3);border:1px solid var(--cobalt-border);color:var(--text);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:1.0rem;margin-bottom:14px;transition:border-color .15s}
.edit-input:focus{outline:none;border-color:var(--cobalt)}
.edit-btns{display:flex;gap:10px}
.btn-save{background:var(--cobalt);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-weight:500;transition:all .15s}
.btn-save:hover{background:#4A8AEB}
.btn-close{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-family:var(--mono);font-size:.72rem;cursor:pointer;transition:all .15s}
.btn-close:hover{border-color:var(--cobalt-border);color:var(--text-mid)}

/* STATEMENT */
.statement{padding:26px 30px;background:rgba(8,16,48,.5);border:1px solid var(--cobalt-border);border-radius:14px;border-left:3px solid var(--cobalt);position:relative;overflow:hidden;animation:hero-pulse 3s ease-in-out infinite}
.statement::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#5A9AEB,var(--copper))}
.stmt-lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;background:linear-gradient(90deg,#5A9AEB,var(--copper));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.stmt-txt{font-family:var(--serif);font-style:italic;font-size:1.06rem;line-height:1.65;color:#D0E0F4}
.stmt-txt b{color:var(--gold);font-style:normal}

/* P5 BRIDGE */
.p5-bridge{background:rgba(8,16,48,.4);border:1px solid var(--cobalt-border);border-radius:14px;padding:22px 28px;margin-bottom:28px;animation:hero-pulse 3s ease-in-out infinite}
.p5-lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;background:linear-gradient(90deg,#5A9AEB,var(--copper));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.p5-txt{font-size:.88rem;color:var(--text-mid);line-height:1.7}
.p5-txt b{color:var(--text-cool);font-weight:500}

.err{background:var(--bg2);border:1px solid var(--red);border-radius:10px;padding:18px;color:var(--red);font-family:var(--mono);font-size:.82rem}

@media(max-width:760px){
  .wrap{padding:24px 20px 60px}
  .hero-grid{grid-template-columns:1fr}
  .hero-divider{display:none}
  .ratio-num{font-size:5rem}
}
</style></head>

</div>

<script src="rf-data.js"></script>
<script>
(function(){

var app = document.getElementById('app');
var overlay = document.getElementById('edit-overlay');

if (!window.RF || !window.RF_DATA) {
  app.innerHTML = '<div class="err">rf-data.js not found.</div>';
  return;
}

var sel = document.getElementById('scen');
RF.list().forEach(function(n){
  var o = document.createElement('option');
  o.value = n; o.textContent = n; sel.appendChild(o);
});
var current = RF.current(); sel.value = current;

// User overrides per scenario
var userInputs = {};
RF.list().forEach(function(n){ userInputs[n] = {}; });

var HOOKS = {
  'High-Growth Tech Startup': 'HR has always had a P&L. Nobody taught them to read it — until now.',
  'Professional Services Firm': 'The partners see a cost centre. This statement shows them a profit centre.',
  'Enterprise Healthcare': 'A negative Human P&L is not a failure. It is a diagnosis. Now you can treat it.',
  'Remote-First SaaS': 'Twenty-three countries. One P&L. For the first time, it is human.',
  'Financial Services': 'Every analyst retained is a line item. Every departure is a write-down.',
  'Manufacturing Firm': 'The machines are on the balance sheet. The people who run them never were.',
  'Sales Organization': 'Revenue is the output. The Human P&L shows what produced it.',
  'Consulting Firm': 'The client buys the partner. The Human P&L prices that relationship correctly.',
  'Family Business': 'Three generations of knowledge. One statement to show what it is worth.',
  'MNC in Asia': 'Global headcount. Local value. The Human P&L translates between the two.',
  'Hospitality': 'The experience is the product. The Human P&L is how you price the people who deliver it.',
  'Corporate America': 'The plant is depreciated over twenty years. The supervisor who runs it never appears.',
  'Government Agency': 'Public service has always had a value. Public accounting has never captured it.',
  'Higher Education': 'Endowments are invested. Faculty are expensed. The Human P&L corrects that.',
  'Social Enterprise': 'Impact without a P&L is hope. Impact with a Human P&L is evidence.'
};

function fmt(sym, n) {
  var abs = Math.abs(n), sign = n < 0 ? '-' : '';
  if (sym === '\u20b9') {
    if (abs >= 10000000) return sign+sym+(abs/10000000).toFixed(2)+'Cr';
    if (abs >= 100000)   return sign+sym+(abs/100000).toFixed(1)+'L';
    if (abs >= 1000)     return sign+sym+Math.round(abs/1000)+'K';
    return sign+sym+Math.round(abs);
  }
  if (abs >= 1000000000) return sign+sym+(abs/1000000000).toFixed(2)+'B';
  if (abs >= 1000000)    return sign+sym+(abs/1000000).toFixed(2)+'M';
  if (abs >= 1000)       return sign+sym+Math.round(abs/1000)+'K';
  return sign+sym+Math.round(abs);
}

function fmtSigned(sym, n) {
  return (n >= 0 ? '+' : '') + fmt(sym, n);
}

function computePL(name) {
  var s = RF.scenario(name); if (!s) return null;
  var emps = s.employees, sym = s.symbol;
  var ui = userInputs[name] || {};
  var totalComp = emps.reduce(function(a,e){ return a+e.salary; }, 0);

  // REVENUE
  var revDepts = ['Sales','Business Dev','Customer Success','Investment Banking','M&A'];
  var revHires = emps.filter(function(e){ return e.tenure<=2 && revDepts.indexOf(e.dept)>=0; });
  var talentAcqValue = Math.round(revHires.reduce(function(a,e){ return a+e.salary*1.4; },0));

  var stars = emps.filter(function(e){ return e.placement==='Star'||e.placement==='High Performer'; });
  var retentionSavings = Math.round(stars.reduce(function(a,e){ return a+e.salary*1.5; },0)*0.3);

  var emerging = emps.filter(function(e){ return e.placement==='Emerging Talent'; });
  var perfUplift = Math.round(emerging.reduce(function(a,e){ return a+e.salary*0.08; },0));

  var tenured = emps.filter(function(e){ return e.tenure>=5; });
  var culturePremium = Math.round(tenured.reduce(function(a,e){ return a+e.salary*0.06; },0));

  var totalRevenue = talentAcqValue + retentionSavings + perfUplift + culturePremium;

  // COGS — HR delivery costs only
  var acqCost     = ui.acqCost     !== undefined ? ui.acqCost     : Math.round(revHires.reduce(function(a,e){ return a+e.salary*0.15; },0));
  var devInvest   = ui.devInvest   !== undefined ? ui.devInvest   : Math.round(emerging.reduce(function(a,e){ return a+e.salary*0.04; },0));
  var hrFuncCost  = ui.hrFuncCost  !== undefined ? ui.hrFuncCost  : Math.round(totalComp*0.04);
  var totalCOGS = acqCost + devInvest + hrFuncCost;

  var grossMargin = totalRevenue - totalCOGS;
  var grossMarginPct = totalRevenue > 0 ? (grossMargin/totalRevenue*100).toFixed(1) : '0.0';

  // OPEX
  var complianceCost = ui.complianceCost !== undefined ? ui.complianceCost : Math.round(totalComp*0.015);
  var cultureSpend   = ui.cultureSpend   !== undefined ? ui.cultureSpend   : Math.round(totalComp*0.02);
  var totalOpEx = complianceCost + cultureSpend;

  var opProfit = grossMargin - totalOpEx;

  // ADJUSTMENTS
  var atRisk = emps.filter(function(e){ return e.placement==='Inconsistent Performer'; });
  var flightRisk = Math.round(atRisk.reduce(function(a,e){ return a+e.salary*0.6; },0));
  var skillDebt  = Math.round(totalComp*0.03);
  var growthGap  = Math.round(totalComp*0.02);
  var totalAdj = flightRisk + skillDebt + growthGap;

  var netProfit = opProfit - totalAdj;
  var hrInvestment = totalCOGS + totalOpEx;
  var ratio = hrInvestment > 0 ? (netProfit/hrInvestment) : 0;

  return {
    sym, totalComp,
    talentAcqValue, retentionSavings, perfUplift, culturePremium, totalRevenue,
    acqCost, devInvest, hrFuncCost, totalCOGS,
    grossMargin, grossMarginPct,
    complianceCost, cultureSpend, totalOpEx,
    opProfit, flightRisk, skillDebt, growthGap, totalAdj,
    netProfit, hrInvestment, ratio,
    employeeCount: s.employeeCount
  };
}

function stmtText(d) {
  var sym = d.sym;
  if (d.netProfit < 0 && d.ratio < -1)
    return 'The Human P&L is <b>deeply negative at '+fmt(sym,d.netProfit)+'</b>. The adjustments below the line — flight risk, skill debt, growth readiness gap — are consuming all operating profit. This is not a cost problem. It is a human capital risk problem that has been allowed to compound. The board needs to see this statement.';
  if (d.netProfit < 0)
    return 'The Human P&L shows a <b>net loss of '+fmt(sym,d.netProfit)+'</b>. Operating profit exists, but the below-the-line adjustments erase it. The organisation is generating value from HR activity — but carrying human capital liabilities that are larger than that value. The adjustment lines tell you exactly where to intervene.';
  if (d.ratio > 3)
    return 'For every '+sym+'1 invested in HR, this organisation returns <b>'+sym+d.ratio.toFixed(1)+'</b>. A Human P&L at '+d.ratio.toFixed(1)+'x is not an HR metric. It is a <b>return on investment statement</b> that belongs in the CFO\'s office. This is the number that changes the conversation permanently.';
  return 'The Human P&L returns <b>'+fmt(sym,d.netProfit)+'</b> on a <b>'+fmt(sym,d.hrInvestment)+'</b> HR investment — a '+d.ratio.toFixed(1)+'x return. The gross margin is healthy. The adjustment lines carry risk that, if addressed, would improve the ratio significantly. This is the statement that makes the case for proactive HR investment.';
}

function showEdit(field, label, hint, currentVal, sym) {
  overlay.innerHTML = '<div class="edit-modal">'
    +'<div class="edit-modal-title">Edit Input</div>'
    +'<div class="edit-modal-label">'+label+'</div>'
    +'<div class="edit-modal-hint">'+hint+'</div>'
    +'<input class="edit-input" id="editVal" type="number" value="'+Math.round(currentVal)+'" placeholder="Enter amount in '+sym+'"/>'
    +'<div class="edit-btns">'
      +'<button class="btn-save" id="editSave">Update P&L</button>'
      +'<button class="btn-close" id="editClose">Cancel</button>'
    +'</div>'
  +'</div>';
  overlay.style.display = 'flex';

  document.getElementById('editSave').addEventListener('click', function(){
    var val = parseInt(document.getElementById('editVal').value);
    if (!isNaN(val) && val >= 0) {
      userInputs[current][field] = val;
      overlay.style.display = 'none';
      render();
    }
  });
  document.getElementById('editClose').addEventListener('click', function(){
    overlay.style.display = 'none';
  });
  overlay.addEventListener('click', function(e){ if(e.target===overlay){overlay.style.display='none';} });
}

function render() {
  var s = RF.scenario(current), sum = RF.summary(current);
  if (!s || !sum) return;

  var d = computePL(current);
  var sym = d.sym;

  document.getElementById('meta').innerHTML =
    '<b>'+d.employeeCount+'</b> people &middot; <b>'+sum.geo+'</b> &middot; comp base <b>'+fmt(sym,d.totalComp)+'</b>';

  ['navP1','navP2','navP3','navP4','navP5'].forEach(function(id,i){
    var el=document.getElementById(id);
    var files=['p1-tool.html','p2-tool.html','p3-tool.html','p4-tool.html','p5-tool.html'];
    if(el) el.href=files[i]+'?scenario='+encodeURIComponent(current);
  });

  var seen=false; try{seen=!!localStorage.getItem('rf_pl_intro');}catch(e){}
  var isOpen=!seen;

  var h = '';

  // INTRO
  h += '<div class="intro-panel">'
    +'<div class="intro-toggle" id="introToggle">'
      +'<div class="intro-tl">'
        +'<div class="intro-icon">?</div>'
        +'<div><div class="intro-title">What is The Human P&amp;L?</div>'
        +'<div class="intro-sub">Read this first &mdash; takes 2 minutes</div></div>'
      +'</div>'
      +'<div class="intro-chevron" id="introChev">'+(isOpen?'Hide &uarr;':'Show &darr;')+'</div>'
    +'</div>'
    +'<div class="intro-body'+(isOpen?' open':'')+'" id="introBody">'
      +'<div class="intro-sec"><div class="intro-sec-lbl">What is it?</div>'
        +'<div class="intro-sec-txt">The Human P&amp;L is a literal income statement for HR — formatted exactly like the P&amp;L your CFO reads every month, but denominated in human capital terms.<br><br>Revenue at the top. Costs below it. Gross margin in the middle. Operating expenses. Adjustments below the line. Net profit or loss at the bottom. <b>And the ratio that changes the conversation permanently: for every unit invested in HR, this organisation returns X.</b></div>'
      +'</div>'
      +'<div class="intro-sec"><div class="intro-sec-lbl">Why does the format matter?</div>'
        +'<div class="intro-sec-txt">The moment this statement looks like what a CFO already reads every month, it stops being an HR document and becomes a financial document about people. That shift is everything.</div>'
        +'<div class="intro-story">A CHRO printed the Human P&amp;L and brought it into the quarterly business review. The CFO picked it up expecting an HR report. He put it down saying it was the most honest financial document about the organisation he had seen all year.<br><br><b>The format did the work. The numbers were already there. They had just never been filed.</b></div>'
      +'</div>'
      +'<div class="intro-sec"><div class="intro-sec-lbl">The editable lines</div>'
        +'<div class="intro-sec-txt">Some lines are auto-computed from the scenario data. <b>Lines marked with a pencil icon can be edited</b> — click them to enter your organisation\'s actual figures. The more accurately you populate these, the more credible the statement becomes.</div>'
      +'</div>'
      +'<div class="intro-transition">Below is the Human P&amp;L for this scenario, <b>pre-computed from real data</b>. Edit the user-input lines to reflect your actual organisation. The ratio at the bottom updates automatically.</div>'
    +'</div>'
    +'</div>';

  // HERO
  var ratioClass = d.ratio >= 2 ? '' : d.ratio >= 0 ? 'style="-webkit-text-fill-color:var(--amber)"' : 'style="-webkit-text-fill-color:var(--red)"';
  h += '<div class="hero"><div class="hero-grid">'
    +'<div>'
      +'<div class="ratio-lbl">Human Net Return &middot; '+sum.geo+'</div>'
      +'<div class="ratio-num" '+ratioClass+'>'+sym+d.ratio.toFixed(1)+'x</div>'
      +'<div class="ratio-desc">returned for every <b>'+sym+'1</b> invested in HR this period</div>'
    +'</div>'
    +'<div class="hero-divider"></div>'
    +'<div>'
      +'<div class="story-rule"></div>'
      +'<div class="hook">'+(HOOKS[current]||'HR has always had a P&L. Nobody taught them to read it.')+'</div>'
      +'<div class="context">Net profit: <b>'+fmt(sym,d.netProfit)+'</b> &middot; HR investment: <b>'+fmt(sym,d.hrInvestment)+'</b> &middot; Gross margin: <b>'+d.grossMarginPct+'%</b></div>'
    +'</div>'
    +'</div></div>';

  // THE P&L STATEMENT
  h += '<div class="pl-wrap">'
    +'<div class="pl-header">'
      +'<div class="pl-header-title">Human P&amp;L Statement</div>'
      +'<div class="pl-header-sub">'+current+' &middot; Q1 2026 &middot; click pencil lines to edit</div>'
    +'</div>'

    // HUMAN REVENUE
    +'<div class="pl-section-head"><span>Human Revenue</span><span>computed from data</span></div>'
    +plRow('Talent Acquisition Value', d.talentAcqValue, sym, 'Revenue-generating hires × productivity premium', false)
    +plRow('Retention Savings', d.retentionSavings, sym, 'Stars and High Performers retained × replacement cost avoided', false)
    +plRow('Performance Uplift', d.perfUplift, sym, 'Development return on Emerging Talent', false)
    +plRow('Culture Premium', d.culturePremium, sym, 'Engagement productivity premium from tenured employees', false)
    +'<div class="pl-subtotal"><div class="pl-subtotal-label">= TOTAL HUMAN REVENUE</div><div class="pl-subtotal-val gold">'+fmt(sym,d.totalRevenue)+'</div></div>'

    // HUMAN COGS
    +'<div class="pl-section-head"><span>Human COGS</span><span>HR delivery costs only</span></div>'
    +plRow('Acquisition Cost', d.acqCost, sym, 'Hiring spend, agency fees, onboarding', true, 'acqCost', 'Acquisition Cost', 'Total spent on hiring — agency fees, job boards, onboarding costs. Typical range: 12-18% of first-year salary per hire.')
    +plRow('Development Investment', d.devInvest, sym, 'Training, coaching, certifications', true, 'devInvest', 'Development Investment', 'Total annual spend on developing people — formal training, coaching, certifications, conferences. Typical range: 2-5% of salary base.')
    +plRow('HR Function Cost', d.hrFuncCost, sym, 'HR team salaries + tools + systems', true, 'hrFuncCost', 'HR Function Cost', 'Total cost of running the HR function — HR team salaries, HRIS tools, systems. Typical range: 3-5% of total comp base.')
    +'<div class="pl-subtotal"><div class="pl-subtotal-label">= TOTAL HUMAN COGS</div><div class="pl-subtotal-val neg">'+fmt(sym,d.totalCOGS)+'</div></div>'

    // GROSS MARGIN
    +'<div class="pl-margin-row"><div class="pl-margin-label">HUMAN GROSS MARGIN</div><div class="pl-margin-val '+(d.grossMargin>=0?'pos':'neg')+'">'+fmt(sym,d.grossMargin)+'</div></div>'
    +'<div class="pl-margin-pct">Gross Margin %: '+d.grossMarginPct+'% &nbsp;&middot;&nbsp; Talent Quality Premium contribution</div>'

    // COMP BASE (shown separately — not in COGS)
    +'<div class="pl-comp-row"><div class="pl-comp-label">Human Investment Base (total compensation) <span style="font-family:var(--mono);font-size:.6rem;color:rgba(184,115,51,.4)">shown separately — not in COGS</span></div><div class="pl-comp-val">'+fmt(sym,d.totalComp)+'</div></div>'

    // OPEX
    +'<div class="pl-section-head"><span>Human OpEx</span><span>edit to match your org</span></div>'
    +plRow('Compliance & Administration', d.complianceCost, sym, 'Legal, payroll ops, HR compliance costs', true, 'complianceCost', 'Compliance & Administration', 'Legal, payroll processing, HR compliance, audits. Typical range: 1-2% of total comp base.')
    +plRow('Culture & Engagement Spend', d.cultureSpend, sym, 'Events, wellbeing, recognition programmes', true, 'cultureSpend', 'Culture & Engagement Spend', 'Team events, wellbeing programmes, recognition, engagement initiatives. Typical range: 1.5-3% of total comp base.')
    +'<div class="pl-subtotal"><div class="pl-subtotal-label">= TOTAL HUMAN OPEX</div><div class="pl-subtotal-val neg">'+fmt(sym,d.totalOpEx)+'</div></div>'

    // OPERATING PROFIT
    +'<div class="pl-margin-row"><div class="pl-margin-label">HUMAN OPERATING PROFIT</div><div class="pl-margin-val '+(d.opProfit>=0?'pos':'neg')+'">'+fmt(sym,d.opProfit)+'</div></div>'

    // ADJUSTMENTS
    +'<div class="pl-section-head"><span>Human Adjustments</span><span>below the line</span></div>'
    +plRow('Flight Risk Liability', d.flightRisk, sym, 'Value at risk from Inconsistent Performers — potential exits × salary', false)
    +plRow('Skill Debt Provision', d.skillDebt, sym, 'Cost of skills gap if unaddressed — 3% of comp base', false)
    +plRow('Growth Readiness Gap', d.growthGap, sym, 'Cost of unpreparedness for next growth stage — 2% of comp base', false)
    +'<div class="pl-adj-note">These adjustments are the honest reckoning. They represent human capital risk the org is carrying right now.</div>'
    +'<div class="pl-subtotal"><div class="pl-subtotal-label">= TOTAL ADJUSTMENTS</div><div class="pl-subtotal-val neg">'+fmt(sym,d.totalAdj)+'</div></div>'

    // NET
    +'<div class="pl-net"><div class="pl-net-label">HUMAN NET PROFIT / LOSS</div><div class="pl-net-val '+(d.netProfit>=0?'pos':'neg')+'">'+fmt(sym,d.netProfit)+'</div></div>'

    // RATIO
    +'<div class="pl-ratio-row"><div class="pl-ratio-label">For every '+sym+'1 invested in HR, this organisation returns</div><div class="pl-ratio-val">'+sym+d.ratio.toFixed(1)+'x</div></div>'

    +'</div>';

  // P5 BRIDGE
  h += '<div class="p5-bridge">'
    +'<div class="p5-lbl">Connection to L5 &mdash; The Human Balance Sheet</div>'
    +'<div class="p5-txt">The Human Net Profit of <b>'+fmt(sym,d.netProfit)+'</b> feeds directly into the Human Balance Sheet as <b>retained human earnings</b> — the accumulated value of HR\'s contribution to the organisation\'s human capital position. A positive net profit strengthens the balance sheet. A negative one erodes it.</div>'
    +'</div>';

  // STATEMENT
  h += '<div class="statement">'
    +'<div class="stmt-lbl">Intelligence Statement</div>'
    +'<div class="stmt-txt">'+stmtText(d)+'</div>'
    +'</div>';

  app.innerHTML = h;

  // Wire intro
  document.getElementById('introToggle').addEventListener('click', function(){
    var body=document.getElementById('introBody'), chev=document.getElementById('introChev');
    var open=body.classList.contains('open');
    if(open){body.classList.remove('open');chev.innerHTML='Show &darr;';try{localStorage.setItem('rf_pl_intro','1');}catch(e){}}
    else{body.classList.add('open');chev.innerHTML='Hide &uarr;';}
  });

  // Wire editable rows
  document.querySelectorAll('.pl-row.editable').forEach(function(row){
    row.addEventListener('click', function(){
      var field=this.getAttribute('data-field');
      var label=this.getAttribute('data-label');
      var hint=this.getAttribute('data-hint');
      var currentVal=parseFloat(this.getAttribute('data-val'));
      showEdit(field, label, hint, currentVal, sym);
    });
  });
}

function plRow(label, val, sym, desc, editable, field, editLabel, editHint) {
  var valClass = val >= 0 ? 'pos' : 'neg';
  if (!editable) valClass = 'neutral';
  var attrs = editable
    ? 'data-field="'+field+'" data-label="'+editLabel+'" data-hint="'+editHint+'" data-val="'+val+'"'
    : '';
  return '<div class="pl-row'+(editable?' editable':'')+'" '+attrs+'>'
    +'<div class="pl-row-label">'
      +label
      +(editable?'<span class="edit-hint">✎ edit</span>':'')
    +'</div>'
    +'<div class="pl-row-val '+valClass+'">'+fmt(sym,val)+'</div>'
    +'</div>'
    +'<div style="padding:2px 28px 8px 44px;font-family:var(--mono);font-size:.58rem;color:rgba(30,80,200,.22);border-top:none">'+desc+'</div>';
}

sel.addEventListener('change', function(){
  current=sel.value;
  var u=new URL(location.href);
  u.searchParams.set('scenario',current);
  history.replaceState({},'',u);
  render();
});

render();

})();
</script>
</body></html>
